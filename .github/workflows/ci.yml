name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Lint with pyflakes
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes
          pyflakes bot.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Syntax check
        run: |
          python -m py_compile bot.py
          echo "✅ bot.py syntax OK"
